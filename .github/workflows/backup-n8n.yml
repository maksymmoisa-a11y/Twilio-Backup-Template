name: Backup n8n

on:
  schedule:
    # Every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Backup workflows
        env:
          N8N_URL: ${{ vars.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          mkdir -p workflows
          # Clear old backups so deleted workflows/credentials don't linger
          rm -f workflows/*.json

          cursor=""
          while true; do
            url="${N8N_URL}/api/v1/workflows?limit=100"
            if [ -n "$cursor" ]; then
              url="${url}&cursor=${cursor}"
            fi

            response=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" "$url")

            # Save each workflow as individual JSON file
            echo "$response" | jq -c '.data[]' | while read -r workflow; do
              id=$(echo "$workflow" | jq -r '.id')
              name=$(echo "$workflow" | jq -r '.name' | sed 's/[^a-zA-Z0-9._-]/_/g')
              echo "$workflow" | jq '.' > "workflows/${id}_${name}.json"
            done

            cursor=$(echo "$response" | jq -r '.nextCursor // empty')
            if [ -z "$cursor" ]; then
              break
            fi
          done

          echo "Backed up $(ls workflows/*.json 2>/dev/null | wc -l | tr -d ' ') workflows"

      - name: Backup credentials
        env:
          N8N_URL: ${{ vars.N8N_URL }}
          N8N_API_KEY: ${{ secrets.N8N_API_KEY }}
        run: |
          mkdir -p credentials
          rm -f credentials/*.json

          cursor=""
          while true; do
            url="${N8N_URL}/api/v1/credentials?limit=100"
            if [ -n "$cursor" ]; then
              url="${url}&cursor=${cursor}"
            fi

            response=$(curl -s -H "X-N8N-API-KEY: ${N8N_API_KEY}" "$url")

            echo "$response" | jq -c '.data[]' | while read -r credential; do
              id=$(echo "$credential" | jq -r '.id')
              name=$(echo "$credential" | jq -r '.name' | sed 's/[^a-zA-Z0-9._-]/_/g')
              echo "$credential" | jq '.' > "credentials/${id}_${name}.json"
            done

            cursor=$(echo "$response" | jq -r '.nextCursor // empty')
            if [ -z "$cursor" ]; then
              break
            fi
          done

          echo "Backed up $(ls credentials/*.json 2>/dev/null | wc -l | tr -d ' ') credentials"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add workflows/ credentials/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Backup n8n workflows and credentials $(date -u +%Y-%m-%d)"
            git push
          fi

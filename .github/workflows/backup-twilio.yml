name: Backup Twilio

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Twilio credentials
        id: twilio
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        run: |
          if [ -z "${TWILIO_ACCOUNT_SID}" ] || [ -z "${TWILIO_AUTH_TOKEN}" ]; then
            echo "Twilio credentials are missing."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Backup Twilio
        if: steps.twilio.outputs.ready == 'true'
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
        run: |
          mkdir -p twilio
          rm -f twilio/*.json

          BASE_URL="https://api.twilio.com/2010-04-01/Accounts/${TWILIO_ACCOUNT_SID}"

          echo "Downloading Account..."
          curl -s -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            "${BASE_URL}.json" | jq '.' > twilio/account.json

          echo "Downloading Incoming Phone Numbers..."
          curl -s -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            "${BASE_URL}/IncomingPhoneNumbers.json" | jq '.' > twilio/incoming-phone-numbers.json

          echo "Downloading Verified Caller IDs..."
          curl -s -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            "${BASE_URL}/OutgoingCallerIds.json" | jq '.' > twilio/verified-caller-ids.json

          echo "Downloading Applications..."
          curl -s -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            "${BASE_URL}/Applications.json" | jq '.' > twilio/applications.json

          echo "Backup finished."

      - name: Commit and push changes
        if: steps.twilio.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add twilio/

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Backup Twilio $(date -u +%Y-%m-%d)"
            git push
          fi
